services:
  # Disable one-off migration container in regular `make dev` up flow.
  # Run it manually via `make migrate` when needed.
  migrate:
    profiles: ["dev-tools"]

  api:
    image: ${APP_IMAGE:-nest-js-app:local}-dev
    env_file:
      - .env
    build:
      context: .
      target: dev
    command: npm run start:dev
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      NODE_ENV: development
      APP_NAME: ${APP_NAME}
      APP_PORT: ${APP_PORT}

      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}

      JWT_SECRET: ${JWT_SECRET}

      # Rabbit
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-orders.exchange}
      RABBITMQ_PROCESS_QUEUE: ${RABBITMQ_PROCESS_QUEUE:-orders.process}
      RABBITMQ_RETRY_QUEUE: ${RABBITMQ_RETRY_QUEUE:-orders.retry}
      RABBITMQ_DLQ_QUEUE: ${RABBITMQ_DLQ_QUEUE:-orders.dlq}
      RABBITMQ_RETRY_DELAY_MS: ${RABBITMQ_RETRY_DELAY_MS:-3000}
      RABBITMQ_PREFETCH: ${RABBITMQ_PREFETCH:-10}
    volumes:
      - ./:/usr/src/app
      - /usr/src/app/node_modules
    ports:
      - "8080:3000"
    networks:
      - internal
      - public

  worker:
    image: ${APP_IMAGE:-nest-js-app:local}-dev
    env_file:
      - .env
    build:
      context: .
      target: dev
    entrypoint: ["sh", "-c", "npm run start:worker:dev"]
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      NODE_ENV: development

      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}

      JWT_SECRET: ${JWT_SECRET}

      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-orders.exchange}
      RABBITMQ_PROCESS_QUEUE: ${RABBITMQ_PROCESS_QUEUE:-orders.process}
      RABBITMQ_RETRY_QUEUE: ${RABBITMQ_RETRY_QUEUE:-orders.retry}
      RABBITMQ_DLQ_QUEUE: ${RABBITMQ_DLQ_QUEUE:-orders.dlq}
      RABBITMQ_RETRY_DELAY_MS: ${RABBITMQ_RETRY_DELAY_MS:-3000}
      RABBITMQ_MAX_ATTEMPTS: ${RABBITMQ_MAX_ATTEMPTS:-3}
      RABBITMQ_PREFETCH: ${RABBITMQ_PREFETCH:-10}
    volumes:
      - ./:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - internal
    restart: unless-stopped

  # Dev-only seed (ts-node)
  seed:
    env_file:
      - .env
    build:
      context: .
      target: dev
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
    networks:
      - internal
    command: ["npm", "run", "seed"]
    profiles: ["dev-tools"]

networks:
  internal:
    internal: true
  public: {}
